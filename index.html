<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Weekly Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body { background: #f4f4f4; padding: 20px; display: flex; flex-direction: column; gap: 40px; min-height: 100vh; }

/* Week container */
.week-container { display: flex; flex-direction: column; gap: 40px; }

/* Week row (Monday–Friday / Sat–Sun) */
.week-row { display: flex; justify-content: center; gap: 20px; flex-wrap: nowrap; }

/* Card styles identical to Today Tool */
.card { 
  width: 300px; 
  height: 420px; 
  border-radius: 12px; 
  padding: 16px; 
  display: flex; 
  flex-direction: column; 
  gap: 8px; 
  position: relative; 
  box-shadow: 0 6px 18px rgba(0,0,0,0.12); 
  overflow: hidden; 
  background:#fff;
  background-image: linear-gradient(to bottom, rgba(0,0,0,0.08) 1px, transparent 1px);
  background-size:1px 24px;
}

.card h2 { font-family: 'Patrick Hand', cursive; font-size: 1.05rem; color: #666; display: flex; justify-content: space-between; align-items: center; }
.card h2 .first { font-weight: bold; }
.card h2 .rest { opacity: 0.3; font-weight: normal; }
#today-date { font-size: 0.8rem; color: #888; margin-left: 6px; }

/* Task list */
.task-list { flex: 1; overflow-y: auto; padding-right: 4px; scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) transparent; }
.task-list::-webkit-scrollbar { width: 6px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.2); border-radius: 3px; }

/* Task style */
.task { display: flex; flex-direction: column; padding: 6px 4px; margin-bottom: 2px; cursor: pointer; }
.task-top { display: flex; align-items: center; justify-content: space-between; }
.circle { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #999; margin-right: 6px; flex-shrink: 0; display: inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; transition: all 0.2s ease; background: #fff; color: #333; }
.circle.completed { background: #34c759; border: none; color: white; }
.task-text { flex: 1; word-break: break-word; font-size: 0.9rem; font-family: 'Inter', sans-serif; }
.task-text.completed { opacity: 0.65; text-decoration: line-through; text-decoration-thickness: 1px; text-decoration-color: #c7c7cc; transition: all 0.25s ease; }
.task-notes { font-size: 0.8rem; color: #555; margin-left: 24px; margin-top: 2px; white-space: pre-wrap; }

/* Add task input */
.add-task { display: flex; gap: 4px; margin-top: 8px; z-index: 1; position: relative; }
.add-task input { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Inter', sans-serif; }
.add-task button { padding: 6px 12px; border: none; border-radius: 6px; background: #333; color: #fff; cursor: pointer; font-family: 'Inter', sans-serif; }
.add-task button:hover { background: #555; }

/* Today highlight */
.today-card { border: 2px solid #34c759; }

/* Responsive */
@media (max-width: 800px) { .week-row { flex-wrap: wrap; justify-content: center; } }

</style>
</head>
<body>

<h2 style="text-align:center; margin-bottom:20px;">Analog Weekly Planner</h2>

<div class="week-container" id="week-container"></div>

<script>
const storageKey='weeklyPlannerTasks';
let weeks = JSON.parse(localStorage.getItem(storageKey)) || [];

// generate 4 weeks if empty
if(weeks.length===0){
  for(let w=0; w<4; w++){
    weeks.push({
      days:[
        {name:'Mon',tasks:[]},{name:'Tue',tasks:[]},{name:'Wed',tasks:[]},{name:'Thu',tasks:[]},{name:'Fri',tasks:[]},
        {name:'Sat',tasks:[]},{name:'Sun',tasks:[]}
      ]
    });
  }
}

// Save
function saveWeeks(){ localStorage.setItem(storageKey,JSON.stringify(weeks)); }

// Render
function renderWeeks(){
  const container = document.getElementById('week-container');
  container.innerHTML='';
  const today = new Date();
  const todayStr = today.toDateString();

  weeks.forEach((week,wIndex)=>{
    // First row: Mon-Fri
    const row1 = document.createElement('div'); row1.className='week-row';
    weeks[wIndex].days.slice(0,5).forEach((day,dIndex)=>{
      row1.appendChild(createDayCard(day,wIndex,dIndex,todayStr));
    });
    container.appendChild(row1);

    // Second row: Sat-Sun
    const row2 = document.createElement('div'); row2.className='week-row';
    weeks[wIndex].days.slice(5).forEach((day,dIndex)=>{
      row2.appendChild(createDayCard(day,wIndex,dIndex+5,todayStr));
    });
    container.appendChild(row2);
  });
}

// Create day card
function createDayCard(day,wIndex,dIndex,todayStr){
  const card = document.createElement('div');
  card.className='card';
  // highlight today
  const cardDate = new Date();
  cardDate.setDate(cardDate.getDate() + (wIndex*7 + dIndex - cardDate.getDay() +1));
  if(cardDate.toDateString()===todayStr) card.classList.add('today-card');

  const h2 = document.createElement('h2');
  h2.textContent = day.name;
  card.appendChild(h2);

  const taskList = document.createElement('div'); taskList.className='task-list';
  day.tasks.forEach((t,i)=>{
    const tDiv = document.createElement('div'); tDiv.className='task';
    const top = document.createElement('div'); top.className='task-top';
    const left = document.createElement('div'); left.style.display='flex'; left.style.alignItems='center';
    const circle = document.createElement('span'); circle.className='circle'; circle.textContent='•';
    const text = document.createElement('span'); text.className='task-text'; text.textContent=t;
    left.append(circle,text); top.append(left); taskList.append(tDiv); tDiv.append(top);
  });
  card.appendChild(taskList);

  // Add task input
  const addDiv = document.createElement('div'); addDiv.className='add-task';
  const input = document.createElement('input'); input.placeholder='New task...';
  const btn = document.createElement('button'); btn.textContent='Add';
  btn.onclick = ()=>{ if(input.value.trim()!==''){ day.tasks.push(input.value.trim()); input.value=''; saveWeeks(); renderWeeks(); } };
  input.addEventListener('keypress',e=>{ if(e.key==='Enter'){ btn.onclick(); } });
  addDiv.append(input,btn);
  card.appendChild(addDiv);

  return card;
}

renderWeeks();
</script>

</body>
</html>
